services:
  # ── Kokoro TTS (internal only) ────────────────────────────────────────────
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: api_kokoro
    restart: unless-stopped
    networks:
      - apinet
    environment:
      - PYTHONUNBUFFERED=1

  # ── ConnectCircuits TTS/media API ─────────────────────────────────────────
  tts-api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: api-api
    restart: unless-stopped
    networks:
      - apinet
    depends_on:
      - kokoro
    ports:
      - "8800:8000"
    volumes:
      - api_data:/app/data
    environment:
      # --- Core ---
      - KOKORO_BASE_URL=http://kokoro:8880
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      # --- Auth ---
      - CONNECTCIRCUITS_API_KEY=${CONNECTCIRCUITS_API_KEY}
      - ADMIN_SECRET=${ADMIN_SECRET}
      # --- Database ---
      - DB_PATH=/app/data/store.db
      - RESULTS_DIR=/app/data/results
      - RESULT_TTL_SEC=${RESULT_TTL_SEC:-21600}
      - JOB_TTL_SEC=${JOB_TTL_SEC:-21600}
      # --- Concurrency ---
      - USER_CONCURRENCY_CAP=${USER_CONCURRENCY_CAP:-3}
      - GLOBAL_WORKER_CONCURRENCY=${GLOBAL_WORKER_CONCURRENCY:-5}
      # --- Webhook ---
      - WEBHOOK_TIMEOUT_SEC=${WEBHOOK_TIMEOUT_SEC:-10}
      - WEBHOOK_RETRIES=${WEBHOOK_RETRIES:-3}
      # --- Image providers ---
      - FLUX_PROVIDER=${FLUX_PROVIDER:-fal}
      - FAL_API_KEY=${FAL_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}

networks:
  apinet:
    driver: bridge

volumes:
  api_data:
